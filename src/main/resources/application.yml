server:
  port: 8081

spring:
  application:
    name: unified-reservation-orchestration-system

  datasource:
    url: jdbc:mysql://localhost:3306/reservation_orchestration_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Test@1171
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Reservation defaults
reservation:
  default-hold-duration-minutes: 15
  expiry-check-interval-ms: 60000

logging:
  level:
    com.uros: DEBUG
    org.hibernate.SQL: DEBUG

